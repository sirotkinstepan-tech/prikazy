{% extends "base_admin.html" %}
{% block title %}Загрузка{% endblock %}
{% block page_title %}Загрузка документа{% endblock %}
{% block content %}
{% if success %}
<div class="alert alert-success">Документ загружен и поставлен в очередь на обработку.</div>
{% endif %}

<form method="post" action="/admin/upload" enctype="multipart/form-data" class="admin-form">
  {% include "csrf_field.html" %}
  <label>
    <span>Файл *</span>
    <input type="file" name="file" required accept=".pdf,.docx,.xlsx,.png,.jpg,.jpeg,.tiff">
  </label>
  <div class="form-row">
    <label>
      <span>Тип документа</span>
      <input type="text" name="doc_type" value="prikaz" placeholder="prikaz">
    </label>
    <label>
      <span>Дата документа</span>
      <input type="date" name="document_date">
    </label>
  </div>
  <label>
    <span>Название</span>
    <input type="text" name="title" placeholder="Приказ №123">
  </label>
  <label>
    <span>Контрагент</span>
    <input type="text" name="counterparty_name" placeholder="Организация">
  </label>
  <button type="submit" class="btn btn-primary">Загрузить</button>
</form>
{% endblock %}
